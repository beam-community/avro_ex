name: Continuous Integration

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - "main"
jobs:
  test:
    name: Build and test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.13.3" # Define the elixir version [required]
          otp-version: "24.3" # Define the OTP version [required]
      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests
        run: mix test
      - name: Check formatting
        run: mix format --check-formatted
      - name: Credo
        run: mix credo

  dialyzer:
    name: Run Dialyzer for type checking
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set mix file hash
        id: set_vars
        run: |
          mix_hash="${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}"
          echo "mix_hash=$mix_hash" >> "$GITHUB_OUTPUT"
      - name: Cache PLT files
        id: cache-plt
        uses: actions/cache@v4
        with:
          path: |
            _build/dev/*.plt
            _build/dev/*.plt.hash
          key: plt-cache-${{ steps.set_vars.outputs.mix_hash }}
          restore-keys: |
            plt-cache-
      - name: Run Dialyzer
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.13.3" # Define the elixir version [required]
          otp-version: "24.3" # Define the OTP version [required]
      - run: mix deps.get
      - run: mix dialyzer
